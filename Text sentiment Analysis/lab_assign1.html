<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Sentiment Analysis</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
color:white;
overflow:hidden;
}

/* glowing background */

body::before,
body::after{
content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(120px);
opacity:0.5;
z-index:-1;
}

body::before{
background:#00f2fe;
top:-150px;
left:-150px;
}

body::after{
background:#9b23ea;
bottom:-150px;
right:-150px;
}

/* container */

.container{
width:600px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border-radius:20px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
}

h1{
font-size:30px;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

.status{
font-size:14px;
margin-bottom:15px;
}

/* textarea */

textarea{
width:100%;
height:120px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
resize:none;
}

textarea:focus{
outline:none;
box-shadow:0 0 10px #00f2fe;
}

/* counter */

.counter{
font-size:12px;
text-align:right;
margin-top:5px;
opacity:0.8;
}

/* buttons */

.buttons{
margin-top:15px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:0.3s;
margin:5px;
}

.analyze{
background:linear-gradient(45deg,#00f2fe,#9b23ea);
color:white;
}

.clear{
background:#ff6b6b;
color:white;
}

button:hover{
transform:scale(1.08);
}

/* loader */

.spinner{
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:20px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* result */

.resultCard{
margin-top:20px;
padding:20px;
border-radius:15px;
display:none;
background:rgba(255,255,255,0.05);
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.result{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.analysis{
font-size:14px;
opacity:0.9;
margin-bottom:10px;
}

.meter{
font-size:40px;
margin-bottom:10px;
}

/* progress bar */

.progressBar{
width:100%;
height:10px;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff9d,#00f2fe);
transition:1s;
}

.footer{
margin-top:20px;
font-size:13px;
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Text Sentiment Analysis</h1>
<div class="subtitle">
Classify text as Positive or Negative using a Pre-trained NLP Model
</div>

<div id="status" class="status">Loading Sentiment Model...</div>

<textarea id="inputText" placeholder="Example: I really love this product!"></textarea>

<div id="counter" class="counter">0 characters</div>

<div class="buttons">
<button class="analyze" id="analyzeBtn" disabled>Analyze Sentiment</button>
<button class="clear" onclick="clearText()">Clear</button>
</div>

<div class="spinner" id="loader"></div>

<div class="resultCard" id="resultCard">

<div class="meter" id="emojiMeter">🙂</div>

<div class="result" id="result"></div>

<div class="analysis" id="analysis"></div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

</div>

<div class="footer">
Created by <b>Tanish Kesharwani</b> 🚀
</div>

</div>

<script type="module">

import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let classifier;

async function loadModel(){

classifier = await pipeline(
"sentiment-analysis",
"Xenova/distilbert-base-uncased-finetuned-sst-2-english"
);

document.getElementById("status").innerText="Sentiment Model Loaded ✓";
document.getElementById("analyzeBtn").disabled=false;

}

await loadModel();

const input=document.getElementById("inputText");
const counter=document.getElementById("counter");

input.addEventListener("input",()=>{
counter.innerText=input.value.length+" characters";
});

window.clearText=function(){
input.value="";
counter.innerText="0 characters";
document.getElementById("resultCard").style.display="none";
}

document.getElementById("analyzeBtn").onclick = analyze;

async function analyze(){

let text=input.value;

if(text.trim()===""){
alert("Please enter text");
return;
}

document.getElementById("loader").style.display="block";

const result = await classifier(text);

document.getElementById("loader").style.display="none";

let label=result[0].label;
let score=(result[0].score*100).toFixed(2);

let emoji = label==="POSITIVE" ? "😊" : "😡";

let message = label==="POSITIVE"
? "The text expresses a Positive sentiment."
: "The text expresses a Negative sentiment.";

document.getElementById("resultCard").style.display="block";

document.getElementById("emojiMeter").innerText=emoji;

document.getElementById("result").innerHTML=
"Prediction: "+label;

document.getElementById("analysis").innerHTML=
message+" | Confidence: "+score+"%";

document.getElementById("progress").style.width=score+"%";

}

</script>

</body>
</html>
