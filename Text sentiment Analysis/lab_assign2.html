<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentiment Testing Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1e293b,#020617);
color:white;
}

/* container */

.container{
width:700px;
padding:35px;
background:#111827;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

/* header */

h1{
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

/* textarea */

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:15px;
border:none;
font-size:15px;
resize:none;
background:#1f2937;
color:white;
}

/* buttons */

.buttons{
margin-top:15px;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:20px;
font-size:15px;
cursor:pointer;
margin:5px;
}

.analyze{
background:#22c55e;
color:white;
}

.clear{
background:#ef4444;
color:white;
}

/* results */

.results{
margin-top:25px;
display:grid;
gap:15px;
}

.resultBox{
background:#1f2937;
padding:15px;
border-radius:15px;
border-left:6px solid #22c55e;
}

.negative{
border-left:6px solid #ef4444;
}

.sentence{
font-size:15px;
margin-bottom:6px;
}

.prediction{
font-weight:bold;
}

.score{
font-size:13px;
opacity:0.8;
}

/* footer */

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Sentiment Testing Tool</h1>

<div class="subtitle">
Test custom sentences and view sentiment confidence scores
</div>

<textarea id="inputText"
placeholder="Enter multiple sentences separated by new line..."></textarea>

<div class="buttons">
<button class="analyze" id="analyzeBtn">Test Sentiment</button>
<button class="clear" onclick="clearText()">Clear</button>
</div>

<div class="results" id="results"></div>

<div class="footer">
Created by <b>Tanish Kesharwani</b>
</div>

</div>

<script type="module">

import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let classifier;

classifier = await pipeline(
"sentiment-analysis",
"Xenova/distilbert-base-uncased-finetuned-sst-2-english"
);

document.getElementById("analyzeBtn").onclick = analyze;

async function analyze(){

let text=document.getElementById("inputText").value;

if(text.trim()==""){
alert("Enter at least one sentence");
return;
}

let sentences=text.split("\n");

let resultsContainer=document.getElementById("results");

resultsContainer.innerHTML="";

for(let sentence of sentences){

if(sentence.trim()=="") continue;

let result=await classifier(sentence);

let label=result[0].label;
let score=(result[0].score*100).toFixed(2);

let box=document.createElement("div");

box.className="resultBox";

if(label==="NEGATIVE"){
box.classList.add("negative");
}

box.innerHTML=`
<div class="sentence">${sentence}</div>
<div class="prediction">Prediction: ${label}</div>
<div class="score">Confidence Score: ${score}%</div>
`;

resultsContainer.appendChild(box);

}

}

function clearText(){
document.getElementById("inputText").value="";
document.getElementById("results").innerHTML="";
}

</script>

</body>
</html>
