<!DOCTYPE html>
<html>
<head>
    <title>AI Pose Detection + Squat Counter</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1c1c1c, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 10px;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 15px;
        }

        .container {
            position: relative;
        }

        video {
            transform: scaleX(-1);
            border-radius: 10px;
        }

        canvas {
            position: absolute;
            left: 0;
            top: 0;
        }

        .big {
            font-size: 28px;
            color: #00ffcc;
            font-weight: bold;
        }

        .footer {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<h1>🤖 Pose Detection + Squat Counter</h1>
<p>📌 Task: Detect pose, visualize skeleton & count squats using keypoint angles.</p>

<div class="dashboard">

    <!-- Video -->
    <div class="card">
        <div class="container">
            <video id="video" width="640" height="480" autoplay></video>
            <canvas id="canvas" width="640" height="480"></canvas>
        </div>
    </div>

    <!-- Stats -->
    <div class="card">
        <h3>📊 Live Stats</h3>
        <div>Posture:</div>
        <div class="big" id="poseLabel">Detecting...</div>

        <div>Squat Count:</div>
        <div class="big" id="counter">0</div>
    </div>

</div>

<div class="footer">
    🚀 Created by <b>Tanish</b>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let poseLabel = document.getElementById("poseLabel");
let counterEl = document.getElementById("counter");

let latestKeypoints = null;
let frameCount = 0;

// Squat logic
let squatCount = 0;
let stage = "up";

// Camera
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480 }
    });
    video.srcObject = stream;
    return new Promise(res => video.onloadedmetadata = res);
}

// Draw points
function drawKeypoints(kp) {
    kp.forEach(k => {
        if (k.score > 0.4) {
            ctx.beginPath();
            ctx.arc(k.x, k.y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "yellow";
            ctx.fill();
        }
    });
}

// Draw skeleton
function drawSkeleton(kp) {
    const pairs = [
        [5,7],[7,9],[6,8],[8,10],
        [5,6],[5,11],[6,12],
        [11,12],[11,13],[13,15],
        [12,14],[14,16]
    ];

    pairs.forEach(([i,j]) => {
        if (kp[i].score > 0.4 && kp[j].score > 0.4) {
            ctx.beginPath();
            ctx.moveTo(kp[i].x, kp[i].y);
            ctx.lineTo(kp[j].x, kp[j].y);
            ctx.strokeStyle = "lime";
            ctx.stroke();
        }
    });
}

// Angle calculation
function calculateAngle(a, b, c) {
    let radians = Math.atan2(c.y - b.y, c.x - b.x) -
                  Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180.0 / Math.PI);
    if (angle > 180) angle = 360 - angle;
    return angle;
}

// Squat detection
function detectSquat(kp) {
    let hip = kp[11];
    let knee = kp[13];
    let ankle = kp[15];

    if (hip.score > 0.4 && knee.score > 0.4 && ankle.score > 0.4) {
        let angle = calculateAngle(hip, knee, ankle);

        if (angle < 90) {
            stage = "down";
            poseLabel.innerText = "⬇ Squat Down";
        }

        if (angle > 160 && stage === "down") {
            stage = "up";
            squatCount++;
            counterEl.innerText = squatCount;
            poseLabel.innerText = "⬆ Standing";
        }
    }
}

// Main
async function main() {
    await setupCamera();
    video.play();

    const detector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
        }
    );

    async function loop() {
        frameCount++;

        if (frameCount % 2 === 0) {
            const poses = await detector.estimatePoses(video);

            if (poses.length > 0) {
                latestKeypoints = poses[0].keypoints;
                detectSquat(latestKeypoints);
            }
        }

        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (latestKeypoints) {
            drawKeypoints(latestKeypoints);
            drawSkeleton(latestKeypoints);
        }

        requestAnimationFrame(loop);
    }

    loop();
}

main();
</script>

</body>
</html>
