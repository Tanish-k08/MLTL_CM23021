<!DOCTYPE html>
<html>
<head>
    <title>Smooth Pose Detection</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #1e1e1e;
            color: white;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        video {
            transform: scaleX(-1);
            border-radius: 10px;
        }

        canvas {
            position: absolute;
            left: 0;
            top: 0;
        }

        .label {
            font-size: 26px;
            margin-top: 10px;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<h2>Pose Detection[Standing vs Sitting]</h2>

<div class="container">
    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<div class="label" id="poseLabel">Detecting...</div>

<p>🚀 Created by Tanish</p>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let poseLabel = document.getElementById("poseLabel");

let latestKeypoints = null;  // 🔥 store last pose
let frameCount = 0;

// Camera
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480 }
    });
    video.srcObject = stream;
    return new Promise(res => video.onloadedmetadata = res);
}

// Draw Keypoints (smooth circles)
function drawKeypoints(kp) {
    kp.forEach(k => {
        if (k.score > 0.4) {
            ctx.beginPath();
            ctx.arc(k.x, k.y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "yellow";
            ctx.fill();
        }
    });
}

// Draw Skeleton (stable lines)
function drawSkeleton(kp) {
    const pairs = [
        [5,7],[7,9],[6,8],[8,10],
        [5,6],[5,11],[6,12],
        [11,12],[11,13],[13,15],
        [12,14],[14,16]
    ];

    pairs.forEach(([i,j]) => {
        if (kp[i].score > 0.4 && kp[j].score > 0.4) {
            ctx.beginPath();
            ctx.moveTo(kp[i].x, kp[i].y);
            ctx.lineTo(kp[j].x, kp[j].y);
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    });
}

// Posture detection
function detectPosture(kp) {
    let hip = (kp[11].y + kp[12].y) / 2;
    let knee = (kp[13].y + kp[14].y) / 2;

    return (knee - hip < 50) ? "🪑 Sitting" : "🧍 Standing";
}

// Main
async function main() {
    await setupCamera();
    video.play();

    const detector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
        }
    );

    async function loop() {
        frameCount++;

        // 🔥 Detect every 2 frames
        if (frameCount % 2 === 0) {
            const poses = await detector.estimatePoses(video);

            if (poses.length > 0) {
                latestKeypoints = poses[0].keypoints;
                poseLabel.innerText = detectPosture(latestKeypoints);
            }
        }

        // 🔥 Draw every frame (smooth)
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (latestKeypoints) {
            drawKeypoints(latestKeypoints);
            drawSkeleton(latestKeypoints);
        }

        requestAnimationFrame(loop);
    }

    loop();
}

main();
</script>

</body>
</html>
