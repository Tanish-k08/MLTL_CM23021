<!DOCTYPE html>
<html>
<head>
    <title>AI Pose Keypoint Detection</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 10px;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .container {
            position: relative;
        }

        video {
            transform: scaleX(-1);
            border-radius: 10px;
        }

        canvas {
            position: absolute;
            left: 0;
            top: 0;
        }

        .info {
            font-size: 18px;
            margin: 10px 0;
        }

        .poseLabel {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }

        .footer {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<h1>🤖 AI Pose Detection Dashboard</h1>

<!-- Task Description -->
<p>📌 Task: Detect human pose keypoints from webcam feed and visualize skeleton in real-time.</p>

<div class="dashboard">

    <!-- Video Section -->
    <div class="card">
        <div class="container">
            <video id="video" width="640" height="480" autoplay></video>
            <canvas id="canvas" width="640" height="480"></canvas>
        </div>
    </div>

    <!-- Info Section -->
    <div class="card">
        <h3>📊 Live Output</h3>
        <div class="info">Pose Status:</div>
        <div class="poseLabel" id="poseLabel">Detecting...</div>

        <div class="info">✔ Keypoints Detection</div>
        <div class="info">✔ Skeleton Visualization</div>
        <div class="info">✔ Real-time Processing</div>
    </div>

</div>

<div class="footer">
    🚀 Created by <b>Tanish</b>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let poseLabel = document.getElementById("poseLabel");

let latestKeypoints = null;
let frameCount = 0;

// Camera setup
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480 }
    });
    video.srcObject = stream;
    return new Promise(res => video.onloadedmetadata = res);
}

// Draw keypoints
function drawKeypoints(kp) {
    kp.forEach(k => {
        if (k.score > 0.4) {
            ctx.beginPath();
            ctx.arc(k.x, k.y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "yellow";
            ctx.fill();
        }
    });
}

// Draw skeleton
function drawSkeleton(kp) {
    const pairs = [
        [5,7],[7,9],[6,8],[8,10],
        [5,6],[5,11],[6,12],
        [11,12],[11,13],[13,15],
        [12,14],[14,16]
    ];

    pairs.forEach(([i,j]) => {
        if (kp[i].score > 0.4 && kp[j].score > 0.4) {
            ctx.beginPath();
            ctx.moveTo(kp[i].x, kp[i].y);
            ctx.lineTo(kp[j].x, kp[j].y);
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    });
}

// Optional posture label
function detectPosture(kp) {
    let hip = (kp[11].y + kp[12].y) / 2;
    let knee = (kp[13].y + kp[14].y) / 2;

    return (knee - hip < 50) ? "🪑 Sitting" : "🧍 Standing";
}

// Main
async function main() {
    await setupCamera();
    video.play();

    const detector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
        }
    );

    async function loop() {
        frameCount++;

        // Detect every 2 frames
        if (frameCount % 2 === 0) {
            const poses = await detector.estimatePoses(video);

            if (poses.length > 0) {
                latestKeypoints = poses[0].keypoints;
                poseLabel.innerText = detectPosture(latestKeypoints);
            }
        }

        // Draw every frame
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (latestKeypoints) {
            drawKeypoints(latestKeypoints);
            drawSkeleton(latestKeypoints);
        }

        requestAnimationFrame(loop);
    }

    loop();
}

main();
</script>

</body>
</html>
