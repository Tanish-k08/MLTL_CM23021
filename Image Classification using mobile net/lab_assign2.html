<!DOCTYPE html>
<html>
<head>

<title>AI Vision Image Classifier</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:950px;
padding:30px;
border-radius:18px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
text-align:center;
}

h1{
margin-bottom:5px;
font-weight:600;
}

.subtitle{
font-size:14px;
opacity:0.85;
}

.upload-area{
margin-top:25px;
padding:25px;
border:2px dashed rgba(255,255,255,0.6);
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.upload-area:hover{
background:rgba(255,255,255,0.08);
}

.preview-area{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
border-radius:14px;
padding:12px;
color:#333;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

.result{
margin-top:10px;
font-size:13px;
text-align:left;
}

.bar-bg{
background:#ddd;
height:14px;
border-radius:8px;
margin-top:4px;
}

.bar{
height:14px;
border-radius:8px;
background:linear-gradient(90deg,#00f2fe,#4facfe);
width:0%;
transition:width 1s;
}

button{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00f2fe,#4facfe);
color:#111;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:0.9;
}

.loader{
margin-top:20px;
display:none;
font-size:14px;
opacity:0.9;
}

.footer{
margin-top:35px;
font-size:14px;
opacity:0.8;
letter-spacing:1px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Vision Image Classifier</h1>
<p class="subtitle">Upload up to 5 images and let AI recognize objects</p>

<div class="upload-area">
<input type="file" id="upload" multiple accept="image/*">
</div>

<div class="preview-area" id="previewArea"></div>

<button onclick="predictImages()">Predict Results</button>

<div class="loader" id="loader">AI is analyzing images...</div>

<div class="footer">
Created by <b>Tanish Kesharwani</b> 🚀
</div>

</div>

<script>

let model;
let images=[];

async function loadModel(){

model = await mobilenet.load({version:2,alpha:1.0});

console.log("MobileNet Model Loaded");

}

loadModel();


// Preview uploaded images
document.getElementById("upload").addEventListener("change",function(e){

let files=e.target.files;

if(files.length>5){

alert("Please upload maximum 5 images");

return;

}

let preview=document.getElementById("previewArea");
preview.innerHTML="";
images=[];

for(let i=0;i<files.length;i++){

let img=document.createElement("img");
img.src=URL.createObjectURL(files[i]);

let card=document.createElement("div");
card.className="card";

let result=document.createElement("div");
result.className="result";
result.id="res"+i;

card.appendChild(img);
card.appendChild(result);

preview.appendChild(card);

images.push(img);

}

});


// Predict Images
async function predictImages(){

if(images.length==0){

alert("Upload images first");

return;

}

document.getElementById("loader").style.display="block";

for(let i=0;i<images.length;i++){

let predictions=await model.classify(images[i],3);

let html="";

predictions.forEach(p=>{

let percent=(p.probability*100).toFixed(2);

html+=`
<div>
<b>${p.className}</b> (${percent}%)
<div class="bar-bg">
<div class="bar" style="width:${percent}%"></div>
</div>
</div>
`;

});

document.getElementById("res"+i).innerHTML=html;

}

document.getElementById("loader").style.display="none";

}

</script>

</body>
</html>
