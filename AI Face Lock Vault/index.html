<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Secure Vault 🔐</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: cyan;
    text-align: center;

    /* ✅ FULL BACKGROUND FIX */
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                url('background.jpg') no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
}

/* REMOVE OLD BACKGROUND */
body::before { display: none; }

.card {
    border: 1px solid cyan;
    margin: 20px auto;
    padding: 20px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 0 25px cyan;
    background: rgba(0,0,0,0.6);
}

video {
    width: 100%;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 6px;
    border: 1px solid cyan;
    background: black;
    color: cyan;
    cursor: pointer;
}
button:hover {
    background: cyan;
    color: black;
}

#vault {
    display: none;
}

/* FILE BOX */
.file-box {
    position: relative;
    display: inline-block;
}

/* 3 DOT MENU */
.menu-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: black;
    color: cyan;
    border: none;
    cursor: pointer;
    font-size: 18px;
}

/* MENU */
.menu {
    display: none;
    position: absolute;
    top: 25px;
    right: 5px;
    background: black;
    border: 1px solid cyan;
    padding: 5px;
}

.menu button {
    display: block;
    width: 100%;
    background: black;
    color: red;
    border: none;
    cursor: pointer;
}

/* MEDIA */
img, video.uploaded {
    width: 100px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🔐 AI FACE LOCK VAULT by TANISH </h1>

<div class="card">
    <video id="video" autoplay></video><br>

    <button onclick="startCamera()">Start Camera</button>
    <button onclick="registerFace()">Register Face</button>
    <button onclick="unlockVault()">Unlock Vault 🔓</button>
    <button onclick="lockVault()">Lock Vault 🔒</button>

    <p id="status">Status: Idle</p>
</div>

<div class="card" id="vault">
    <h2>📁 Private Vault</h2>
    <input type="file" id="fileInput" multiple>
    <div id="gallery"></div>
</div>

<script>
let model, video;
let db;

// ================= CAMERA =================
async function startCamera() {
    video = document.getElementById("video");
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    model = await blazeface.load();
    document.getElementById("status").innerText = "Camera Started ✅";
}

// ================= REGISTER FACE =================
async function registerFace() {
    let samples = [];
    document.getElementById("status").innerText = "Registering Face...";

    for (let i = 0; i < 3; i++) { // faster
        await new Promise(r => setTimeout(r, 300));
        const pred = await model.estimateFaces(video, false);

        if (pred.length > 0) {
            samples.push(pred[0].topLeft);
        }
    }

    if (samples.length > 0) {
        localStorage.setItem("faceData", JSON.stringify(samples));
        document.getElementById("status").innerText = "Face Stored Permanently ✅";
    } else {
        document.getElementById("status").innerText = "Face Not Detected ❌";
    }
}

// ================= UNLOCK =================
async function unlockVault() {
    const stored = JSON.parse(localStorage.getItem("faceData"));
    const pred = await model.estimateFaces(video, false);

    if (!stored || pred.length === 0) {
        document.getElementById("status").innerText = "Detection Failed ❌";
        return;
    }

    let current = pred[0].topLeft;
    let match = 0;

    for (let s of stored) {
        let diff = Math.abs(current[0] - s[0]) + Math.abs(current[1] - s[1]);
        if (diff < 80) match++;
    }

    let confidence = (match / stored.length) * 100;

    if (confidence > 60) {
        document.getElementById("vault").style.display = "block";
        document.getElementById("status").innerText =
            "Vault Unlocked 🔓 (" + confidence.toFixed(1) + "%)";
        loadFiles();
    } else {
        document.getElementById("status").innerText =
            "Access Denied ❌ (" + confidence.toFixed(1) + "%)";
    }
}

// ================= LOCK =================
function lockVault() {
    document.getElementById("vault").style.display = "none";
    document.getElementById("status").innerText = "Vault Locked 🔒";
}

// ================= INDEXED DB =================
const request = indexedDB.open("VaultDB", 1);

request.onupgradeneeded = function(e) {
    db = e.target.result;
    db.createObjectStore("files", { autoIncrement: true });
};

request.onsuccess = function(e) {
    db = e.target.result;
};

// Save File
function saveFile(file) {
    const tx = db.transaction("files", "readwrite");
    tx.objectStore("files").add(file);
}

// Load Files
function loadFiles() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const tx = db.transaction("files", "readonly");
    const store = tx.objectStore("files");

    store.openCursor().onsuccess = function(e) {
        const cursor = e.target.result;
        if (cursor) {
            displayFile(cursor.value, cursor.key);
            cursor.continue();
        }
    };
}

// Display File WITH MENU
function displayFile(file, key) {
    const gallery = document.getElementById("gallery");

    const box = document.createElement("div");
    box.className = "file-box";

    const url = URL.createObjectURL(file);

    // 3-dot button
    const btn = document.createElement("button");
    btn.innerText = "⋮";
    btn.className = "menu-btn";

    const menu = document.createElement("div");
    menu.className = "menu";

    const del = document.createElement("button");
    del.innerText = "Delete";
    del.onclick = () => {
        if (confirm("Are you sure you want to delete this file?")) {
            deleteFile(key);
            box.remove();
        }
    };

    menu.appendChild(del);

    btn.onclick = () => {
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    };

    box.appendChild(btn);
    box.appendChild(menu);

    if (file.type.startsWith("image")) {
        let img = document.createElement("img");
        img.src = url;
        box.appendChild(img);
    } else {
        let vid = document.createElement("video");
        vid.src = url;
        vid.controls = true;
        vid.classList.add("uploaded");
        box.appendChild(vid);
    }

    gallery.appendChild(box);
}

// DELETE FUNCTION
function deleteFile(id) {
    const tx = db.transaction("files", "readwrite");
    tx.objectStore("files").delete(id);
}

// Upload
document.getElementById("fileInput").addEventListener("change", function(e) {
    for (let file of e.target.files) {
        saveFile(file);
        loadFiles();
    }
});
</script>

</body>
</html>
