<!DOCTYPE html>
<html>
<head>
<title>AI Object Detection Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:270px;
background:#020617;
padding:20px;
border-right:2px solid #1e293b;
}

.sidebar h2{
color:#38bdf8;
}

.objectList{
margin-top:20px;
font-size:16px;
line-height:26px;
}

/* Main */

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.title{
font-size:28px;
margin-bottom:15px;
color:#38bdf8;
}

#videoWrapper{
position:relative;
}

video{
width:640px;
height:480px;
border-radius:10px;
border:3px solid #38bdf8;
}

canvas{
position:absolute;
top:0;
left:0;
}

.controls{
margin-top:15px;
}

button{
padding:10px 25px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#38bdf8;
color:black;
margin:5px;
}

button:hover{
background:#0ea5e9;
}

.status{
margin-top:10px;
font-size:16px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Detected Objects</h2>
<div class="objectList" id="objectList">None</div>

<div style="margin-top:20px;">
<b>Frame Classification</b>
<div id="classification">None</div>
</div>

<div style="margin-top:20px;">
<b>Performance Metrics</b><br>
FPS : <span id="fps">0</span><br>
Avg FPS : <span id="avgfps">0</span><br>
Inference Time : <span id="infTime">0</span> ms
</div>

</div>


<div class="main">

<div class="title">
🤖 AI Webcam Detection & Classification <br>
BY TANISH KESHARWANI
</div>

<div id="videoWrapper">
<video id="webcam" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button onclick="startDetection()">Start</button>
<button onclick="stopDetection()">Stop</button>
</div>

<div class="status" id="status">
Status : Waiting
</div>

</div>


<script>

const video=document.getElementById("webcam");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const status=document.getElementById("status");
const objectList=document.getElementById("objectList");
const classification=document.getElementById("classification");

const fpsText=document.getElementById("fps");
const avgFpsText=document.getElementById("avgfps");
const infTimeText=document.getElementById("infTime");

let detectionModel;
let classificationModel;

let detecting=false;

let lastFrameTime=performance.now();
let frameCount=0;
let totalFPS=0;

/* Setup Camera */

async function setupCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject=stream;

return new Promise(resolve=>{
video.onloadedmetadata=()=>resolve();
});

}


/* Start Detection */

async function startDetection(){

status.innerText="Loading AI Models...";

detectionModel=await cocoSsd.load();
classificationModel=await mobilenet.load();

await setupCamera();

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

detecting=true;

status.innerText="Detecting and Analyzing Performance";

detectFrame();

}


/* Stop */

function stopDetection(){

detecting=false;

ctx.clearRect(0,0,canvas.width,canvas.height);

status.innerText="Detection Stopped";

objectList.innerText="None";
classification.innerText="None";

}


/* Detection Loop */

async function detectFrame(){

if(!detecting) return;

/* Start inference timer */

const inferenceStart=performance.now();

/* Object Detection */

const predictions=await detectionModel.detect(video);

/* Classification */

const results=await classificationModel.classify(video);

/* End inference timer */

const inferenceEnd=performance.now();

const inferenceTime=(inferenceEnd-inferenceStart).toFixed(2);

infTimeText.innerText=inferenceTime;

/* FPS calculation */

const now=performance.now();

const fps=Math.round(1000/(now-lastFrameTime));

lastFrameTime=now;

frameCount++;
totalFPS+=fps;

const avgFPS=(totalFPS/frameCount).toFixed(1);

fpsText.innerText=fps;
avgFpsText.innerText=avgFPS;

/* Clear canvas */

ctx.clearRect(0,0,canvas.width,canvas.height);

let objects=[];

/* Draw bounding boxes */

predictions.forEach(pred=>{

const [x,y,w,h]=pred.bbox;

ctx.strokeStyle="#00ffea";
ctx.lineWidth=3;

ctx.strokeRect(x,y,w,h);

ctx.fillStyle="#00ffea";
ctx.font="18px Arial";

ctx.fillText(
pred.class+" "+Math.round(pred.score*100)+"%",
x,
y>10?y-5:10
);

objects.push(pred.class);

});

objectList.innerHTML=objects.length?objects.join("<br>"):"None";

/* Top 3 classifications */

const top3=results.slice(0,3);

classification.innerHTML=top3
.map(r=>r.className+" ("+(r.probability*100).toFixed(1)+"%)")
.join("<br>");

/* Overlay classification on video */

ctx.fillStyle="yellow";
ctx.font="20px Arial";

ctx.fillText("Classification:",10,25);

top3.forEach((r,i)=>{

ctx.fillText(
r.className+" ("+(r.probability*100).toFixed(1)+"%)",
10,
50+(i*25)
);

});

/* Continue loop */

requestAnimationFrame(detectFrame);

}

</script>

</body>
</html>
